name: Build Cloudstream3 Plugin

on:
  push:
    branches: [master, main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: zulu

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build plugin
        run: ./gradlew GioVangProvider:make
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}

      # Debug: xem gradlew sinh ra file gì và ở đâu
      - name: List build outputs
        run: |
          echo "=== Root ==="
          ls -la
          echo "=== GioVangProvider/build ==="
          find GioVangProvider/build -type f 2>/dev/null || echo "(empty)"
          echo "=== *.cs3 anywhere ==="
          find . -name "*.cs3" 2>/dev/null
          echo "=== plugins.json anywhere ==="
          find . -name "plugins.json" 2>/dev/null

      # Thu thập file .cs3 + plugins.json từ mọi nơi gradle đặt chúng
      - name: Collect artifacts
        run: |
          mkdir -p __output

          # .cs3 thường nằm ở gốc repo sau khi gradlew:make chạy
          find . -name "*.cs3" -not -path "./__output/*" \
                               -exec cp {} __output/ \;

          # plugins.json có thể ở gốc hoặc trong build/
          find . -name "plugins.json" -not -path "./__output/*" \
                                      -exec cp {} __output/ \;

          echo "=== __output/ ==="
          ls -la __output/

      # Sinh repo.json
      - name: Generate repo.json
        run: |
          REPO="${{ github.repository }}"
          cat > __output/repo.json << REPOEOF
          {
            "name": "GioVang TV",
            "description": "Plugin xem bóng đá trực tiếp từ giovang.vin",
            "manifestVersion": 1,
            "pluginLists": [
              "https://raw.githubusercontent.com/${REPO}/builds/plugins.json"
            ]
          }
          REPOEOF
          echo "repo.json OK"

      # Nếu plugins.json chưa được sinh bởi gradle, tạo thủ công
      - name: Generate plugins.json (fallback)
        run: |
          REPO="${{ github.repository }}"
          if [ ! -f __output/plugins.json ]; then
            echo "[" > __output/plugins.json
            echo "  {" >> __output/plugins.json
            echo "    \"internalName\": \"GioVangProvider\"," >> __output/plugins.json
            echo "    \"name\": \"GioVang TV\"," >> __output/plugins.json
            echo "    \"version\": 1," >> __output/plugins.json
            echo "    \"url\": \"https://raw.githubusercontent.com/${REPO}/builds/GioVangProvider.cs3\"," >> __output/plugins.json
            echo "    \"tvTypes\": [\"Live\"]," >> __output/plugins.json
            echo "    \"language\": \"vi\"," >> __output/plugins.json
            echo "    \"description\": \"Trực tiếp bóng đá từ giovang.vin\"," >> __output/plugins.json
            echo "    \"iconUrl\": \"https://www.google.com/s2/favicons?domain=giovang.vin&sz=256\"" >> __output/plugins.json
            echo "  }" >> __output/plugins.json
            echo "]" >> __output/plugins.json
            echo "plugins.json generated (fallback)"
          else
            echo "plugins.json already exists from gradle"
          fi
          cat __output/plugins.json

      # Push lên branch "builds" dùng git trực tiếp (đáng tin cậy hơn action bên ngoài)
      - name: Push to builds branch
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Tạo branch "builds" nếu chưa có, hoặc checkout nếu đã có
          git fetch origin builds 2>/dev/null || true

          # Lưu các file cần push ra thư mục tạm bên ngoài git
          cp -r __output /tmp/plugin_builds

          # Switch sang branch builds (tạo orphan nếu chưa có)
          if git ls-remote --exit-code --heads origin builds; then
            git checkout builds
          else
            git checkout --orphan builds
            git rm -rf . --quiet
          fi

          # Copy file vào branch builds
          cp /tmp/plugin_builds/* .

          # Commit và push
          git add *.cs3 plugins.json repo.json 2>/dev/null || git add .
          git status
          git commit -m "Build: ${{ github.sha }}" || echo "Nothing to commit"
          git push origin builds
          echo "✅ Pushed to builds branch"
