name: Build Cloudstream3 Plugin

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: zulu

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # Build .cs3 + sinh plugins.json tự động
      - name: Build plugin
        run: ./gradlew GioVangProvider:make

      # Gom tất cả .cs3 + plugins.json vào thư mục __builds/
      - name: Collect build artifacts
        run: |
          mkdir -p __builds
          find . -name "*.cs3" -not -path "./__builds/*" \
                               -not -path "./build/*" \
                 -exec cp {} __builds/ \;
          # plugins.json được gradlew:make sinh ra ở gốc repo
          [ -f plugins.json ] && cp plugins.json __builds/
          echo "=== __builds/ ==="
          ls -la __builds/

      # Sinh repo.json (URL người dùng dán vào app Cloudstream)
      - name: Generate repo.json
        run: |
          REPO="${{ github.repository }}"
          BRANCH="builds"
          cat > __builds/repo.json << REPOEOF
          {
            "name": "GioVang TV",
            "description": "Plugin xem bóng đá trực tiếp từ giovang.vin",
            "manifestVersion": 1,
            "pluginLists": [
              "https://raw.githubusercontent.com/${REPO}/${BRANCH}/plugins.json"
            ]
          }
          REPOEOF
          echo "repo.json:"
          cat __builds/repo.json

      # Push thư mục __builds/ lên branch "builds"
      - name: Deploy to builds branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: builds
          folder: __builds
          clean: false
          commit-message: "Build ${{ github.sha }}"
          git-config-name: github-actions[bot]
          git-config-email: github-actions[bot]@users.noreply.github.com
